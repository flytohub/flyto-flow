name: Flyto2 Flow Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ce-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/check_dco.py --base "$BASE_SHA" --head "$HEAD_SHA"

  boundary:
    name: Boundary and inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install packaging
      - run: python scripts/check-ce-purity.py .
      - run: python scripts/audit_ce_dependencies.py .

  backend:
    name: Backend CE smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/ui/web/backend/requirements-ce.lock
      - run: pip install --require-hashes -r src/ui/web/backend/requirements-ce.lock
      - run: pip install pytest pytest-asyncio packaging
      - run: python scripts/audit_ce_dependencies.py . --python-installed
      - run: python scripts/generate_ce_sbom.py . --python-installed
      - run: python -m pytest -q tests/ce
        env:
          DEPLOYMENT_MODE: offline
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ce-compliance
          path: |
            sbom.cdx.json
            THIRD_PARTY_DEPENDENCIES.md
          if-no-files-found: error

  frontend:
    name: Frontend CE build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ui/web/frontend/package-lock.json
      - run: npm --prefix src/ui/web/frontend ci
      - run: npm --prefix src/ui/web/frontend audit --audit-level=high
      - run: npm --prefix src/ui/web/frontend run check:i18n-static
      - run: npm --prefix src/ui/web/frontend run test:run
      - run: npm --prefix src/ui/web/frontend run build

  container:
    name: CE container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: install/Dockerfile.ce
          push: false
          tags: flyto2-flow:test
