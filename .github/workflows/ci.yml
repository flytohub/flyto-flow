name: Flyto2 Flow Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ce-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contribution-terms:
    name: Contribution terms
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/check_contribution_terms.py --base "$BASE_SHA" --head "$HEAD_SHA"

  boundary:
    name: Boundary and inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Check public documentation contract
        run: python scripts/check_docs.py .
      - name: Check release contracts
        run: |
          python scripts/check_version.py .
          python scripts/check_dependency_lock.py
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: flytohub/flyto-indexer
          ref: 6769a3f2d9333784d2a8ca2acc025617aa4a4990
          path: .audit-tools/flyto-indexer
      - run: pip install packaging ruff==0.15.15 './.audit-tools/flyto-indexer'
      - name: Test Flow/Cloud synchronization contract
        run: python -m unittest discover -s tests -p 'test_flow_cloud_sync_contract.py'
      - run: python scripts/check-ce-purity.py .
      - run: python scripts/check_license_policy.py .
      - run: python scripts/audit_ce_dependencies.py .
      - name: Run focused Python lint
        run: ruff check --ignore E402,F401 src/ui/web/backend scripts tests
      - name: Run Flyto2 Indexer verify gate
        run: |
          flyto-index scan .
          flyto-index verify . --strict \
            --query "MCP Studio workflow tool origin security sync"

  backend:
    name: Backend CE smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/ui/web/backend/requirements-ce.lock
      - run: pip install --require-hashes -r src/ui/web/backend/requirements-ce.lock
      - run: pip install pytest pytest-asyncio packaging
      - name: Verify extension contracts
        run: python scripts/verify_extensions.py extensions --allow-unsigned
      - run: python scripts/audit_ce_dependencies.py . --python-installed
      - run: python scripts/generate_ce_sbom.py . --python-installed
      - run: python -m pytest -q tests/ce
        env:
          DEPLOYMENT_MODE: offline
      - name: Run queue concurrency and recovery smoke
        run: python scripts/load_test.py queue --jobs 500 --workers 8 --min-throughput 25
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ce-compliance
          path: |
            sbom.cdx.json
            THIRD_PARTY_DEPENDENCIES.md
          if-no-files-found: error

  frontend:
    name: Frontend CE build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/ui/web/frontend/package-lock.json
      - run: npm --prefix src/ui/web/frontend ci
      - run: npm --prefix src/ui/web/frontend audit --audit-level=high
      - run: npm --prefix src/ui/web/frontend run check:i18n-static
      - run: npm --prefix src/ui/web/frontend run test:run
      - name: Build frontend
        working-directory: src/ui/web/frontend
        run: npm run build

  container:
    name: CE container / ${{ matrix.arch }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: install/Dockerfile.ce
          load: true
          platforms: ${{ matrix.platform }}
          push: false
          tags: flyto2-flow:test-${{ matrix.arch }}
      - name: Verify native container
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach \
            --name flyto-flow-ci \
            --init \
            --shm-size=1g \
            --publish 127.0.0.1:19000:9000 \
            "flyto2-flow:test-${{ matrix.arch }}"
          trap 'docker logs flyto-flow-ci; docker rm --force flyto-flow-ci' EXIT

          ready=0
          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:19000/api/health >/tmp/health.json; then
              ready=1
              break
            fi
            sleep 2
          done
          test "${ready}" = "1"
          curl --fail --silent http://127.0.0.1:19000/api/runtime-config >/tmp/runtime.json
          curl --fail --silent http://127.0.0.1:19000/api/connections/catalog >/tmp/catalog.json
          jq -e '.status == "ok" and .version == "0.1.0" and .mode == "offline"' /tmp/health.json
          jq -e '
            .edition == "ce"
            and .capabilities.connections.builtInTransport == false
            and (.capabilities.connections.types | length) >= 9
          ' /tmp/runtime.json
          jq -e '.ok == true and (.connection_types | length) >= 9' /tmp/catalog.json
          test "$(docker exec flyto-flow-ci id -u)" != "0"
