name: Publish Flow image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  security-events: write

concurrency:
  group: flow-image-${{ github.ref }}
  cancel-in-progress: false

env:
  CANDIDATE_IMAGE: flyto2-flow-release:${{ github.sha }}
  IMAGE_NAME: docker.io/flyto2/flow

jobs:
  publish:
    name: Build, verify, and publish
    if: github.repository == 'flytohub/flyto-flow'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out the release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must match vMAJOR.MINOR.PATCH."
            exit 1
          fi

          if [[ "$(git tag --points-at HEAD --list "${tag}")" != "${tag}" ]]; then
            echo "::error::The checked-out revision is not the ${tag} release tag."
            exit 1
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build release candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: install/Dockerfile.ce
          load: true
          platforms: linux/amd64
          provenance: false
          push: false
          sbom: false
          tags: ${{ env.CANDIDATE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start release candidate
        run: |
          docker run --detach \
            --name flyto-flow-release \
            --init \
            --shm-size=1g \
            --publish 127.0.0.1:19000:9000 \
            --volume flyto-flow-release-data:/data/flyto \
            "${CANDIDATE_IMAGE}"

      - name: Verify release candidate
        shell: bash
        run: |
          set -euo pipefail

          for _ in {1..60}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:19000/api/health > /dev/null; then
              exit 0
            fi

            if [[ "$(docker inspect --format='{{.State.Running}}' flyto-flow-release)" != "true" ]]; then
              break
            fi
            sleep 2
          done

          echo "::error::The release candidate did not become healthy."
          docker logs flyto-flow-release
          exit 1

      - name: Show candidate logs on failure
        if: failure()
        run: docker logs flyto-flow-release

      - name: Stop release candidate
        if: always()
        run: |
          docker rm --force flyto-flow-release || true
          docker volume rm flyto-flow-release-data || true

      - name: Scan release candidate
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.CANDIDATE_IMAGE }}
          format: sarif
          output: trivy-results.sarif
          scanners: vuln
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload release scan
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # codeql-bundle-v2.26.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-flow-release

      - name: Verify Docker Hub credentials
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::error::Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN before publishing."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.release.outputs.tag }}
            type=raw,value=latest
            type=sha,format=long
          labels: |
            org.opencontainers.image.title=Flyto2 Flow
            org.opencontainers.image.description=Self-hosted visual workflow builder and MCP tool studio
            org.opencontainers.image.url=https://github.com/flytohub/flyto-flow
            org.opencontainers.image.source=https://github.com/flytohub/flyto-flow
            org.opencontainers.image.documentation=https://github.com/flytohub/flyto-flow/blob/main/docs/getting-started.md
            org.opencontainers.image.vendor=Flyto2
            org.opencontainers.image.licenses=PolyForm-Shield-1.0.0
            org.opencontainers.image.version=${{ steps.release.outputs.version }}

      - name: Publish release image
        id: publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: install/Dockerfile.ce
          platforms: linux/amd64
          provenance: mode=max
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published manifest
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: docker buildx imagetools inspect "${IMAGE_NAME}@${DIGEST}"

      - name: Publish Docker Hub overview
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: flyto2/flow
          short-description: Visual workflows, local execution, and MCP tools for AI agents.
          readme-filepath: ./docs/dockerhub.md

      - name: Write release summary
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          {
            echo "## Flyto2 Flow ${VERSION}"
            echo
            echo "- Image: \`${IMAGE_NAME}:${VERSION}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo "- Platform: \`linux/amd64\`"
            echo "- Security: candidate health check and blocking Trivy scan passed"
            echo "- Supply chain: SBOM and provenance attestations published"
          } >> "${GITHUB_STEP_SUMMARY}"
