name: Publish Flow image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  security-events: write

concurrency:
  group: flow-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: docker.io/flyto2/flow

jobs:
  build:
    name: Verify and publish ${{ matrix.arch }}
    if: github.repository == 'flytohub/flyto-flow'
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 75
    env:
      CANDIDATE_IMAGE: flyto2-flow-release:${{ github.sha }}-${{ matrix.arch }}
    steps:
      - name: Check out the release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tags must match vMAJOR.MINOR.PATCH."
            exit 1
          fi

          if [[ "$(git tag --points-at HEAD --list "${tag}")" != "${tag}" ]]; then
            echo "::error::The checked-out revision is not the ${tag} release tag."
            exit 1
          fi

          version="${tag#v}"
          python scripts/check_version.py . --tag "${tag}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build release candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: install/Dockerfile.ce
          load: true
          platforms: ${{ matrix.platform }}
          provenance: false
          push: false
          sbom: false
          tags: ${{ env.CANDIDATE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start release candidate
        run: |
          docker run --detach \
            --name flyto-flow-release \
            --init \
            --shm-size=1g \
            --publish 127.0.0.1:19000:9000 \
            --volume flyto-flow-release-data:/data/flyto \
            "${CANDIDATE_IMAGE}"

      - name: Verify release candidate
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          ready=0
          for _ in {1..60}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:19000/api/health > /tmp/health.json; then
              ready=1
              break
            fi

            if [[ "$(docker inspect --format='{{.State.Running}}' flyto-flow-release)" != "true" ]]; then
              break
            fi
            sleep 2
          done

          if [[ "${ready}" != "1" ]]; then
            echo "::error::The release candidate did not become healthy."
            docker logs flyto-flow-release
            exit 1
          fi

          curl --fail --silent \
            http://127.0.0.1:19000/api/runtime-config > /tmp/runtime.json
          curl --fail --silent \
            http://127.0.0.1:19000/api/connections/catalog > /tmp/catalog.json
          jq -e \
            --arg version "${VERSION}" \
            '.status == "ok" and .version == $version and .mode == "offline"' \
            /tmp/health.json
          jq -e '
            .edition == "ce"
            and .capabilities.connections.builtInTransport == false
            and (.capabilities.connections.types | length) >= 9
          ' /tmp/runtime.json
          jq -e '.ok == true and (.connection_types | length) >= 9' /tmp/catalog.json
          test "$(docker exec flyto-flow-release id -u)" != "0"

      - name: Show candidate logs on failure
        if: failure()
        run: docker logs flyto-flow-release

      - name: Stop release candidate
        if: always()
        run: |
          docker rm --force flyto-flow-release || true
          docker volume rm flyto-flow-release-data || true

      - name: Scan release candidate
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.CANDIDATE_IMAGE }}
          format: sarif
          output: trivy-results-${{ matrix.arch }}.sarif
          scanners: vuln
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload release scan
        if: always() && hashFiles(format('trivy-results-{0}.sarif', matrix.arch)) != ''
        uses: github/codeql-action/upload-sarif@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # codeql-bundle-v2.26.1
        with:
          sarif_file: trivy-results-${{ matrix.arch }}.sarif
          category: trivy-flow-release-${{ matrix.arch }}

      - name: Verify Docker Hub credentials
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::error::Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN before publishing."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=Flyto2 Flow
            org.opencontainers.image.description=Self-hosted visual workflow builder and MCP tool studio
            org.opencontainers.image.url=https://github.com/flytohub/flyto-flow
            org.opencontainers.image.source=https://github.com/flytohub/flyto-flow
            org.opencontainers.image.documentation=https://github.com/flytohub/flyto-flow/blob/main/docs/getting-started.md
            org.opencontainers.image.vendor=Flyto2
            org.opencontainers.image.licenses=PolyForm-Shield-1.0.0
            org.opencontainers.image.version=${{ steps.release.outputs.version }}

      - name: Publish release image
        id: publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: install/Dockerfile.ce
          platforms: ${{ matrix.platform }}
          provenance: mode=max
          push: true
          sbom: true
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export platform digest
        shell: bash
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Write platform summary
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          {
            echo "## Flyto2 Flow ${VERSION} / ${{ matrix.platform }}"
            echo
            echo "- Platform digest: \`${DIGEST}\`"
            echo "- Security: candidate health check and blocking Trivy scan passed"
            echo "- Supply chain: SBOM and provenance attestations published"
          } >> "${GITHUB_STEP_SUMMARY}"

  merge:
    name: Publish multi-architecture manifest
    if: github.repository == 'flytohub/flyto-flow'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the release
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          python scripts/check_version.py . --tag "${tag}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare manifest metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.release.outputs.tag }}
            type=raw,value=latest
            type=sha,format=long

      - name: Create multi-architecture manifest
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags < <(jq -r '.tags[]' <<< "${DOCKER_METADATA_OUTPUT_JSON}")
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "${tag}")
          done
          sources=()
          for digest_file in /tmp/digests/*; do
            sources+=("${IMAGE_NAME}@sha256:$(basename "${digest_file}")")
          done
          if [[ "${#sources[@]}" -ne 2 ]]; then
            echo "::error::Expected exactly two platform digests."
            exit 1
          fi
          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

      - name: Verify published platforms
        id: manifest
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          raw="$(docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}" --raw)"
          jq -e '
            [.manifests[].platform
              | select(.os == "linux")
              | .architecture] as $architectures
            | ($architectures | index("amd64")) != null
              and ($architectures | index("arm64")) != null
          ' <<< "${raw}"
          digest="$(
            docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}" \
              | awk '/^Digest:/ {print $2; exit}'
          )"
          test -n "${digest}"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Publish Docker Hub overview
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: flyto2/flow
          short-description: Visual workflows, local execution, and MCP tools for AI agents.
          readme-filepath: ./docs/dockerhub.md

      - name: Write release summary
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          {
            echo "## Flyto2 Flow ${VERSION}"
            echo
            echo "- Image: \`${IMAGE_NAME}:${VERSION}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo "- Security: native health checks and blocking Trivy scans passed"
            echo "- Supply chain: per-platform SBOM and provenance attestations published"
          } >> "${GITHUB_STEP_SUMMARY}"
