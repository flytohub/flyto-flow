services:
  flyto-cloud:
    build:
      context: ..
      dockerfile: install/Dockerfile.ce
    env_file:
      - ./.env.ce
    environment:
      FLYTO_OFFLINE_DB_PATH: /data/flyto/offline.db
      FLYTO_WARROOM_IMPORT_DIR: /data/warroom-inbox
    ports:
      - "9000:9000"
    volumes:
      - flyto-cloud-data:/data/flyto
      - ./warroom-inbox:/data/warroom-inbox
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  flyto-cloud-data:
