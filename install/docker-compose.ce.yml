services:
  flyto-flow:
    build:
      context: ..
      dockerfile: install/Dockerfile.ce
    env_file:
      - ./.env.ce
    environment:
      FLYTO_OFFLINE_DB_PATH: /data/flyto/offline.db
      HEADLESS: "1"
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - flyto-flow-data:/data/flyto
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  flyto-flow-data:
