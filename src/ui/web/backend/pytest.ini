[pytest]
testpaths = tests ../../../../tests
asyncio_mode = auto
pythonpath = .
addopts = -v --tb=short -q --cov=api/agent --cov=api/engine --cov=api/browser --cov=api/breakpoint --cov=api/core --cov=api/telemetry --cov=api/workflows --cov=api/executions --cov=api/triggers --cov-report=term-missing --cov-config=.coveragerc
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require running services)
    e2e: End-to-end tests (full stack, requires running server)
    security: Security and penetration tests
